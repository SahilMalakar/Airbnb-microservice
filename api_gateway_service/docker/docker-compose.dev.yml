name: api-gateway

services:
  postgres:
    image: postgres:17-alpine
    container_name: api-gateway-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gatewaypassword
      POSTGRES_DB: gateway_db

    ports:
      - "5435:5432"

    volumes:
      - gateway_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gateway_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped

volumes:
  gateway_postgres_data: