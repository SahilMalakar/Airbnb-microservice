services:
    postgres:
        image: postgres:17-alpine
        container_name: hotel-postgres

        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: hotelpassword
            POSTGRES_DB: hotel_service_db

        ports:
            - '5433:5432'

        volumes:
            - hotel_postgres_data:/var/lib/postgresql/data

        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d hotel_service_db']
            interval: 5s
            timeout: 5s
            retries: 5

        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: hotel-redis

        command: redis-server --requirepass hotelpassword

        ports:
            - '6380:6379'

        volumes:
            - hotel_redis_data:/data

        healthcheck:
            test: ['CMD', 'redis-cli', '-a', 'hotelpassword', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

        restart: unless-stopped

volumes:
    hotel_postgres_data:
    hotel_redis_data:
